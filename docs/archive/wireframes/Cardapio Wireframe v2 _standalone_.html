document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<title>Wireframe v2 · Cardápio — Portal Cora<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>/* ═══════════════════════════════════════════════════════════════\n   CORA — Design Tokens (cores + tipografia)\n   Fonte única de verdade. Importe com:\n     <link rel=\"stylesheet\" href=\"colors_and_type.css\">\n   ═══════════════════════════════════════════════════════════════\n\n   PRINCÍPIOS\n   — Um azul só. Brand-500 (#2E55CD) é o protagonista.\n   — Azul escuro é detalhe, não dominante. Brand-700/800 e ink-700\n     só aparecem em acentos pontuais (texto pequeno, badges, divisores).\n     Nunca em superfícies grandes nem como cor de heading padrão.\n   — Flat, sempre. Sem gradientes, sem shadows, sem pill buttons.\n     (Exceção funcional: focus ring usa box-shadow por acessibilidade.)\n   — Hierarquia por cor de fundo: página (warm-50) → card (warm-100) → modal (#FFF).\n   — Tons quentes, nunca cinza puro. Warm-50 (#FAFAF8) como fundo, nunca #FFFFFF.\n   — League Gothic para títulos (sempre uppercase). Montagu Slab para corpo.\n*/\n\n/* League Gothic — variable font local (eixo wdth 75–100) */\n@font-face {\n  font-family: 'League Gothic';\n  src: url(\"653535fb-4ee9-4868-98b8-bcb3ac32d607\") format('truetype-variations'),\n       url(\"efa53677-cc59-4f88-861b-a20f6ee27b6d\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-stretch: 75% 100%;\n  font-display: swap;\n}\n/* Instância condensed explícita, se preciso fixar largura */\n@font-face {\n  font-family: 'League Gothic Condensed';\n  src: url(\"b627a168-07f2-4f44-a1f8-b56e12c5a4eb\") format('truetype');\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'League Gothic SemiCondensed';\n  src: url(\"1900cf38-6ccf-44a4-a067-c874f40ea7b3\") format('truetype');\n  font-weight: 400;\n  font-display: swap;\n}\n\n/* Montagu Slab — variable font local (fonts/ enviado pela marca) */\n@font-face {\n  font-family: 'Montagu Slab';\n  src: url(\"38fd6c51-b871-4b73-b40b-4dac8120b11c\") format('truetype-variations'),\n       url(\"38fd6c51-b871-4b73-b40b-4dac8120b11c\") format('truetype');\n  font-weight: 100 700;\n  font-style: normal;\n  font-display: swap;\n  /* opsz 24–144; browsers modernos ajustam automaticamente pelo size */\n}\n\n:root {\n  /* ── BRAND (azul — o protagonista) ───────────────────── */\n  --brand-50:  #EBEEFB;\n  --brand-100: #C4CDF4;\n  --brand-200: #8B9BE6;\n  --brand-400: #5670D8;\n  --brand-500: #2E55CD;   /* ★ cor primária — Royal Azure */\n  --brand-600: #2545A8;   /* hover */\n  --brand-700: #1D3787;\n  --brand-800: #172E6E;   /* headings sobre fundo claro */\n  --brand-900: #0F1E49;\n\n  /* ── ACCENTS (uso editorial, nunca estrutural) ─────────\n     Cores de expressão, não de interface. Jamais substituem\n     brand-* ou status-* em componentes de UI.\n     Pink     — JAMAIS para erro, pagamento, alerta ou produção.\n                Apenas marketing, hero, highlight editorial.\n                Vermelho vibrante ativa resposta de ameaça;\n                use --danger apenas em bloqueio crítico.\n     Sand     — calor e textura editorial (hero, ilustrações).\n                Não usar em componentes funcionais.\n     Prussian — fundo escuro alternativo, modo reverso.          */\n  --pink-50:   #FFE6E9;\n  --pink-200:  #FFB3BB;\n  --pink-500:  #FF5362;   /* ★ Bubblegum Pink — editorial apenas */\n  --pink-700:  #C7303E;\n\n  --sand-50:   #F6F3EA;\n  --sand-200:  #E2D9C0;\n  --sand-500:  #BFB48F;   /* ★ Sand — editorial apenas */\n  --sand-700:  #8C8261;\n\n  --ink-500:   #1A2543;   /* intermediário */\n  --ink-700:   #0B1532;   /* ★ Prussian Blue — fundo escuro */\n  --ink-900:   #050A1C;\n\n  /* ── WARM (tons quentes, nunca cinza puro) ───────────── */\n  --warm-50:  #FAFAF8;    /* ★ fundo de página */\n  --warm-100: #F5F4F0;    /* ★ fundo de card */\n  --warm-200: #E8E6E1;    /* bordas, divisores */\n  --warm-300: #D4D1CA;    /* bordas interativas, inputs */\n  --warm-400: #A8A49C;    /* texto terciário, labels */\n  --warm-500: #7A766E;    /* texto secundário */\n  --warm-600: #5C5850;    /* corpo de texto */\n  --warm-700: #3D3A34;    /* texto forte */\n  --warm-800: #2A2723;    /* headings em corpo de texto */\n\n  /* ── STATUS (raros, contextuais) ──────────────────────\n     Vermelho APENAS para alerta crítico bloqueante (ex. estoque zero).\n     Pagamento recusado usa laranja (atenção), não vermelho.           */\n  --success-bg:     #D1FAE5;\n  --success-text:   #065F46;\n  --success-border: #6EE7B7;\n\n  --warning-bg:     #FEF3C7;\n  --warning-text:   #92400E;\n  --warning-border: #FCD34D;\n\n  --info-bg:        #DBEAFE;\n  --info-text:      #1E40AF;\n  --info-border:    #93C5FD;\n\n  --danger-bg:      #FEE2E2;   /* use apenas em bloqueios críticos */\n  --danger-text:    #991B1B;\n  --danger-border:  #FCA5A5;\n\n  /* ── TIPOGRAFIA ───────────────────────────────────────\n     Duas vozes apenas. Jamais Inter, Roboto, Arial.              */\n  --font-display: 'League Gothic', Impact, 'Arial Narrow', sans-serif;\n  --font-body:    'Montagu Slab', Georgia, Palatino, serif;\n\n  /* Escala tipográfica — mobile first */\n  --text-display-xl: 56px;   /* hero */\n  --text-display-lg: 30px;   /* saudação */\n  --text-display-md: 26px;   /* section title */\n  --text-display-sm: 22px;   /* step title */\n\n  --text-body-lg:  18px;\n  --text-body:     16px;     /* mínimo mobile — teste da Sra. Beatriz */\n  --text-body-sm:  14px;\n  --text-caption:  13px;\n  --text-label:    12px;\n  --text-micro:    11px;\n\n  --leading-tight: 1.1;\n  --leading-snug:  1.3;\n  --leading-body:  1.6;      /* ★ padrão para Montagu Slab */\n\n  --tracking-display: 0.02em;\n  --tracking-label:   0.04em;\n\n  /* ── RAIOS ────────────────────────────────────────────\n     Border-radius infinito é proibido como decoração.\n     --radius-full existe APENAS para elementos genuinamente\n     circulares (ícones de ✕, badge numérico, avatar).\n     Botões retangulares NUNCA usam --radius-full.                */\n  --radius-xs:   4px;        /* badges, checkboxes, pílulas pequenas */\n  --radius-md:   8px;        /* botões, inputs, sub-blocos */\n  --radius-lg:   12px;       /* cards */\n  --radius-xl:   16px;       /* modais, bottom-sheets (cantos superiores) */\n  --radius-full: 9999px;     /* círculos apenas — ✕, badge, avatar */\n\n  /* ── ESPAÇAMENTO ─────────────────────────────────────  */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* ── ANIMAÇÃO (sempre funcional, nunca decorativa) ──  */\n  --ease-out: cubic-bezier(0.2, 0, 0, 1);\n  --dur-fast: 150ms;\n  --dur-base: 200ms;\n  --dur-slow: 300ms;\n\n  /* ── ALVOS MÍNIMOS (acessibilidade) ─────────────────   */\n  --tap-target: 44px;\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   ESTILOS SEMÂNTICOS (aplicam as voices)\n   ═══════════════════════════════════════════════════════════════ */\n\nhtml, body {\n  font-family: var(--font-body);\n  font-size: var(--text-body);\n  line-height: var(--leading-body);\n  color: var(--warm-600);\n  background-color: var(--warm-50);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, h2, h3, h4, h5, h6,\n.heading,\n.display {\n  font-family: var(--font-display);\n  text-transform: uppercase;    /* ★ sempre */\n  letter-spacing: var(--tracking-display);\n  font-weight: 400;             /* League Gothic é condensada — não usar bold */\n  color: var(--brand-500);      /* ★ azul protagonista. Para mais peso,\n                                   aumente font-size ou font-stretch —\n                                   nunca escureça a cor. */\n  line-height: var(--leading-tight);\n  margin: 0;\n}\n\nh1 { font-size: var(--text-display-lg); }\nh2 { font-size: var(--text-display-md); }\nh3 { font-size: var(--text-display-sm); }\nh4 { font-size: 18px; }\n\n/* Heading em azul escuro — APENAS quando o tom escuro for o detalhe,\n   nunca a cor de superfície. Ex.: rótulo pequeno sobre warm-100,\n   badge numérico, micro-título de tabela compacta.\n   Ver princípio “azul escuro é detalhe, não dominante”.            */\n.heading-deep { color: var(--brand-800); }\n\n/* Label (small caps display) — usado sobre cards */\n.label-display {\n  font-family: var(--font-display);\n  font-size: var(--text-caption);\n  text-transform: uppercase;\n  color: var(--warm-400);\n  letter-spacing: var(--tracking-label);\n  line-height: 1;\n}\n\np, li, dd, dt, figcaption { font-family: var(--font-body); }\np { margin: 0 0 var(--space-4); }\nstrong, b { font-weight: 600; }\n\n/* Valores financeiros — sempre Montagu Slab, peso 600, brand-500 */\n.money {\n  font-family: var(--font-body);\n  font-weight: 600;\n  color: var(--brand-500);\n  font-variant-numeric: tabular-nums;\n}\n\n/* Código (raro — apenas em documentação) */\ncode, pre {\n  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n  font-size: 0.92em;\n  background: var(--warm-100);\n  border-radius: var(--radius-xs);\n  padding: 1px 5px;\n}\n\na { color: var(--brand-500); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n/* ═══════════════════════════════════════════════════════════════\n   FOCUS RING — acessível, azul sobre warm\n   Box-shadow é proibido em decoração (ver PRINCÍPIOS no topo),\n   mas é permitido aqui como exceção funcional — acessibilidade\n   por teclado exige um indicador visível de foco (WCAG 2.1 AA).\n   Não replicar este padrão em outros componentes.\n   ═══════════════════════════════════════════════════════════════ */\n*:focus-visible {\n  outline: none;\n  box-shadow: 0 0 0 3px var(--brand-50), 0 0 0 5px var(--brand-500);\n}\n\n/* ═══════════════════════════════════════════════════════════════\n   UTILITÁRIOS\n   ═══════════════════════════════════════════════════════════════ */\n.bg-page    { background: var(--warm-50); }\n.bg-card    { background: var(--warm-100); }\n.bg-modal   { background: #FFFFFF; }\n.bg-brand   { background: var(--brand-500); }\n.bg-brand-tint { background: var(--brand-50); }\n\n.divider { height: 1px; background: var(--warm-200); border: 0; }\n<\u002Fstyle>\n\n<style>\n  /* ───── stage / chrome do wireframe ───── */\n  html,body{margin:0;background:#E8E6E1;min-height:100vh;color:var(--warm-700)}\n  body{font-family:var(--font-body)}\n\n  .doc-head{\n    position:sticky;top:0;z-index:50;\n    background:#1A1612;color:#F0EAE0;\n    padding:14px 28px 0;border-bottom:1px solid #2A2723;\n  }\n  .doc-head .row1{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:8px}\n  .doc-head h1{\n    font-family:var(--font-display);\n    text-transform:uppercase;color:#F5F4F0;\n    font-size:22px;letter-spacing:.02em;margin:0;\n  }\n  .doc-head .sub{\n    font-family:var(--font-body);font-size:12px;color:#A8A49C;\n    letter-spacing:.04em;\n  }\n  .doc-head .meta{margin-left:auto;font-size:11px;color:#7A766E;font-family:var(--font-body);letter-spacing:.04em;text-transform:uppercase}\n  .doc-head nav{display:flex;gap:0;flex-wrap:wrap;padding-bottom:0}\n  .doc-head nav a{\n    font-family:var(--font-display);\n    text-transform:uppercase;letter-spacing:.04em;font-size:12px;\n    color:#A8A49C;padding:10px 14px;border-bottom:2px solid transparent;\n    cursor:pointer;text-decoration:none;\n  }\n  .doc-head nav a.active,\n  .doc-head nav a:hover{color:#F5F4F0;border-bottom-color:var(--brand-400);text-decoration:none}\n  .doc-head nav a .n{\n    display:inline-block;width:18px;height:18px;border-radius:var(--radius-xs);\n    background:#2A2723;color:#A8A49C;text-align:center;line-height:18px;\n    font-size:10px;font-family:var(--font-body);margin-right:6px;\n  }\n  .doc-head nav a.active .n{background:var(--brand-500);color:#fff}\n\n  main{padding:36px 28px 80px}\n\n  .screen-block{margin-bottom:48px;scroll-margin-top:120px}\n  .screen-block h2{\n    font-family:var(--font-display);text-transform:uppercase;\n    font-size:18px;color:var(--warm-800);letter-spacing:.04em;\n    margin:0 0 4px;display:flex;align-items:baseline;gap:10px;\n  }\n  .screen-block h2 .n{\n    display:inline-block;width:24px;height:24px;border-radius:var(--radius-xs);\n    background:var(--warm-800);color:#fff;font-family:var(--font-body);font-size:12px;\n    text-align:center;line-height:24px;letter-spacing:0;\n  }\n  .screen-block .desc{\n    font-family:var(--font-body);font-size:13px;color:var(--warm-600);\n    line-height:1.6;max-width:640px;margin:0 0 18px;\n  }\n\n  .layout{display:grid;grid-template-columns:380px 1fr;gap:36px;align-items:start}\n  @media (max-width: 900px){.layout{grid-template-columns:1fr}}\n\n  /* ───── phone frame ───── */\n  .phone{\n    width:380px;height:800px;\n    background:var(--warm-50);\n    border-radius:24px;overflow:hidden;\n    border:1px solid var(--warm-200);\n    box-shadow:0 6px 24px rgba(26,24,21,.10);\n    position:relative;\n  }\n  .phone.tall{height:auto;min-height:800px}\n\n  /* annotation column (next to phone) */\n  .notes{\n    font-family:var(--font-body);font-size:13px;line-height:1.65;color:var(--warm-700);\n    padding-top:8px;\n  }\n  .notes h3{\n    font-family:var(--font-display);font-size:13px;text-transform:uppercase;\n    color:var(--warm-800);letter-spacing:.06em;margin:18px 0 6px;\n  }\n  .notes h3:first-child{margin-top:0}\n  .notes ul{margin:0 0 10px;padding-left:18px}\n  .notes li{margin-bottom:4px}\n  .notes code{font-size:12px;background:var(--warm-100);padding:1px 5px;border-radius:3px;color:var(--warm-800)}\n  .notes .pill{\n    display:inline-block;padding:2px 8px;font-size:11px;\n    font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;\n    background:var(--warm-100);color:var(--warm-700);border-radius:var(--radius-xs);\n    border:1px solid var(--warm-200);\n  }\n  .notes .pill.kill{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5;text-decoration:line-through}\n  .notes .pill.add{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border)}\n  .notes .pill.keep{background:var(--brand-50);color:var(--brand-700);border-color:var(--brand-100)}\n\n  /* ───── portal: topbar / nav / content ───── */\n  .topbar{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:14px 18px 12px;background:var(--warm-50);\n    border-bottom:1px solid var(--warm-200);\n    position:relative;z-index:2;\n  }\n  .topbar img{height:28px;display:block}\n  .icon-btn{\n    width:40px;height:40px;display:flex;align-items:center;justify-content:center;\n    background:transparent;border:none;cursor:pointer;color:var(--warm-500);padding:0;\n  }\n  .icon-btn:hover{color:var(--warm-700)}\n  .content{padding:18px 18px 132px;overflow-y:auto;height:calc(100% - 53px - 56px);box-sizing:border-box}\n  .phone.tall .content{height:auto;overflow:visible}\n\n  /* page title block */\n  .page-title{\n    font-family:var(--font-display);\n    text-transform:uppercase;letter-spacing:.02em;\n    font-size:30px;color:var(--brand-500);\n    line-height:1.05;margin:4px 0 4px;\n  }\n  .page-sub{\n    font-family:var(--font-body);font-size:14px;color:var(--warm-600);\n    line-height:1.5;margin:0 0 14px;\n  }\n\n  /* cutoff + cobrança lines */\n  .cutoff{\n    background:var(--warning-bg);border:1px solid var(--warning-border);\n    color:var(--warning-text);\n    font-family:var(--font-body);font-size:13px;line-height:1.5;\n    padding:10px 12px;border-radius:var(--radius-md);\n    margin:8px 0 8px;\n    display:flex;align-items:flex-start;gap:8px;\n  }\n  .cutoff svg{flex-shrink:0;margin-top:1px}\n  .billing-line{\n    font-family:var(--font-body);font-size:13px;color:var(--warm-500);\n    line-height:1.5;margin:0 0 18px;padding:0 2px;\n    display:flex;align-items:center;gap:8px;\n  }\n  .billing-line svg{flex-shrink:0;color:var(--warm-400)}\n\n  /* ───── ProductCard ───── */\n  .product{\n    background:#fff;border:1px solid var(--warm-200);\n    border-radius:var(--radius-lg);overflow:hidden;\n    margin-bottom:12px;\n  }\n  .product .row{\n    display:flex;gap:14px;padding:14px;align-items:flex-start;cursor:pointer;\n    transition:background var(--dur-fast) var(--ease-out);\n  }\n  .product .row:hover{background:var(--warm-50)}\n  .product .photo{\n    width:88px;height:88px;border-radius:var(--radius-md);\n    background:var(--warm-200) center/cover no-repeat;\n    flex-shrink:0;position:relative;overflow:hidden;\n  }\n  .product .photo::after{\n    content:\"\";position:absolute;inset:0;\n    background:linear-gradient(135deg,rgba(0,0,0,.04),rgba(0,0,0,.02));\n  }\n  .product .photo .ph-label{\n    position:absolute;left:0;right:0;bottom:0;\n    font-family:var(--font-display);font-size:9px;letter-spacing:.06em;\n    text-transform:uppercase;color:rgba(255,255,255,.85);\n    text-align:center;padding:2px;background:rgba(0,0,0,.15);\n  }\n  /* photo color stubs */\n  .ph-original{background-color:#C8A98A}\n  .ph-integral{background-color:#8C6541}\n  .ph-multi{background-color:#A07A52}\n  .ph-focaccia{background-color:#D4A972}\n  .ph-brioche{background-color:#D9B380}\n  .ph-ciabatta{background-color:#BD9870}\n\n  .product .info{flex:1;min-width:0}\n  .product .name{\n    font-family:var(--font-body);font-weight:600;\n    color:var(--warm-800);font-size:16px;line-height:1.3;\n    margin:0;\n  }\n  .product .meta{\n    font-family:var(--font-body);font-size:12px;color:var(--warm-500);\n    margin-top:2px;line-height:1.4;\n  }\n  .product .desc{\n    font-family:var(--font-body);font-size:13px;color:var(--warm-600);\n    line-height:1.5;margin-top:6px;\n  }\n  .product .price-row{\n    display:flex;align-items:baseline;justify-content:space-between;\n    margin-top:10px;\n  }\n  .product .price{\n    font-family:var(--font-body);font-weight:600;\n    color:var(--brand-500);font-size:16px;font-variant-numeric:tabular-nums;\n  }\n  .product .expand-hint{\n    font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;\n    font-size:10px;color:var(--warm-400);\n    display:flex;align-items:center;gap:4px;\n  }\n  .product .expand-hint svg{transition:transform var(--dur-base) var(--ease-out)}\n  .product.is-expanded .expand-hint svg{transform:rotate(180deg)}\n\n  .product .cta-zone{padding:0 14px 14px}\n  .product .add-btn{\n    display:flex;align-items:center;justify-content:center;gap:8px;\n    width:100%;min-height:44px;padding:12px 14px;\n    background:var(--brand-500);color:#fff;\n    font-family:var(--font-body);font-weight:500;font-size:14px;\n    border:none;border-radius:var(--radius-md);cursor:pointer;\n    transition:background var(--dur-fast) var(--ease-out);\n  }\n  .product .add-btn:hover{background:var(--brand-600)}\n  .product .add-btn svg{flex-shrink:0}\n\n  /* accordion body */\n  .product .accordion{\n    max-height:0;overflow:hidden;\n    transition:max-height var(--dur-slow) var(--ease-out);\n    border-top:0 solid var(--warm-200);\n  }\n  .product.is-expanded .accordion{\n    max-height:600px;border-top:1px solid var(--warm-200);\n  }\n  .product .accordion-inner{padding:14px 14px 4px;background:var(--warm-50)}\n  .product .acc-label{\n    font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;\n    font-size:11px;color:var(--warm-500);margin:0 0 4px;\n  }\n  .product .acc-body{\n    font-family:var(--font-body);font-size:13px;color:var(--warm-700);\n    line-height:1.6;margin:0 0 12px;\n  }\n  .product .acc-ingredients{\n    display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;\n  }\n  .product .ing-chip{\n    font-family:var(--font-body);font-size:12px;color:var(--warm-700);\n    background:#fff;border:1px solid var(--warm-200);\n    border-radius:var(--radius-xs);padding:3px 8px;\n  }\n  .product .acc-close{\n    width:100%;background:none;border:none;cursor:pointer;\n    font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;\n    font-size:11px;color:var(--warm-500);padding:8px 0 10px;\n    display:flex;align-items:center;justify-content:center;gap:6px;\n    border-top:1px solid var(--warm-200);\n  }\n  .product .acc-close:hover{color:var(--warm-800)}\n\n  /* ───── Home cesta card ───── */\n  .cesta-card{\n    background:var(--brand-50);border:1px solid var(--brand-100);\n    border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;\n  }\n  .cesta-card .lbl{\n    font-family:var(--font-display);text-transform:uppercase;\n    font-size:11px;letter-spacing:.06em;color:var(--brand-700);\n    margin-bottom:8px;\n  }\n  .cesta-card .title{\n    font-family:var(--font-body);font-weight:600;color:var(--brand-800);\n    font-size:16px;line-height:1.3;margin-bottom:10px;\n  }\n  .cesta-list{display:flex;flex-direction:column;gap:0}\n  .cesta-row{\n    display:flex;align-items:center;justify-content:space-between;gap:10px;\n    padding:10px 0;border-bottom:1px dashed var(--brand-100);\n    font-family:var(--font-body);font-size:14px;color:var(--brand-800);\n  }\n  .cesta-row:last-child{border-bottom:0}\n  .cesta-row .name{flex:1;line-height:1.4}\n  .cesta-row .name .tag{\n    display:inline-block;margin-left:4px;font-size:11px;color:var(--brand-600);\n    font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;\n    background:#fff;border:1px solid var(--brand-100);\n    padding:1px 5px;border-radius:var(--radius-xs);vertical-align:1px;\n  }\n  .cesta-row .price-cell{\n    font-family:var(--font-body);font-weight:600;color:var(--brand-700);\n    font-size:14px;font-variant-numeric:tabular-nums;white-space:nowrap;\n  }\n  .cesta-card .total{\n    display:flex;justify-content:space-between;align-items:baseline;\n    padding-top:12px;margin-top:6px;border-top:1px solid var(--brand-100);\n    font-family:var(--font-body);\n  }\n  .cesta-card .total .k{font-size:12px;color:var(--brand-700)}\n  .cesta-card .total .v{font-size:18px;font-weight:700;color:var(--brand-500);font-variant-numeric:tabular-nums}\n  .edit-cesta-link{\n    display:flex;align-items:center;justify-content:center;gap:6px;\n    width:100%;margin-top:10px;padding:8px;\n    background:transparent;border:1px dashed var(--brand-100);\n    border-radius:var(--radius-md);cursor:pointer;\n    font-family:var(--font-display);text-transform:uppercase;\n    letter-spacing:.06em;font-size:11px;color:var(--brand-500);\n  }\n  .edit-cesta-link:hover{background:#fff;border-style:solid}\n\n  /* ───── qty selector [- N +] ───── */\n  .qty{\n    display:inline-flex;align-items:center;\n    border:1px solid var(--warm-300);border-radius:var(--radius-md);\n    background:#fff;overflow:hidden;\n  }\n  .qty button{\n    width:32px;height:32px;display:flex;align-items:center;justify-content:center;\n    background:transparent;border:none;cursor:pointer;color:var(--brand-500);\n    padding:0;\n  }\n  .qty button:hover{background:var(--brand-50)}\n  .qty button:disabled{color:var(--warm-300);cursor:not-allowed;background:transparent}\n  .qty .n{\n    min-width:28px;text-align:center;font-family:var(--font-body);\n    font-weight:600;font-size:14px;color:var(--warm-800);\n    border-left:1px solid var(--warm-200);border-right:1px solid var(--warm-200);\n    line-height:32px;font-variant-numeric:tabular-nums;\n  }\n  .qty.brand{border-color:var(--brand-100);background:#fff}\n  .qty.brand .n{border-color:var(--brand-100)}\n\n  /* ───── footer + nav (portal) ───── */\n  .footer{\n    position:absolute;left:0;right:0;bottom:56px;background:#fff;\n    border-top:1px solid var(--warm-200);padding:12px 18px;\n  }\n  .footer .sum{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}\n  .footer .sum .k{font-family:var(--font-body);font-size:13px;color:var(--warm-500)}\n  .footer .sum .v{font-family:var(--font-body);font-size:18px;font-weight:700;color:var(--brand-500);font-variant-numeric:tabular-nums}\n  .btn-primary{\n    width:100%;padding:13px;background:var(--brand-500);color:#fff;\n    font-family:var(--font-body);font-size:14px;font-weight:500;\n    border:none;border-radius:var(--radius-md);cursor:pointer;min-height:44px;\n  }\n  .btn-primary:hover{background:var(--brand-600)}\n  .btn-ghost{\n    width:100%;padding:13px;background:transparent;color:var(--brand-500);\n    font-family:var(--font-body);font-size:14px;font-weight:500;\n    border:1.5px solid var(--brand-500);border-radius:var(--radius-md);cursor:pointer;min-height:44px;\n  }\n  .btn-ghost:hover{background:var(--brand-50)}\n\n  .nav{\n    position:absolute;bottom:0;left:0;right:0;background:#fff;\n    display:flex;justify-content:space-around;align-items:center;\n    border-top:1px solid var(--warm-200);height:56px;\n  }\n  .nav-item{\n    display:flex;flex-direction:column;align-items:center;gap:2px;\n    background:none;border:none;cursor:pointer;padding:6px 10px;\n  }\n  .nav-item .lbl{font-family:var(--font-display);font-size:10px;letter-spacing:.06em;text-transform:uppercase}\n  .nav-item.on{color:var(--brand-500)}\n  .nav-item.off{color:var(--warm-400)}\n\n  /* ───── isolated card stage (for screens 1 & 2) ───── */\n  .iso-stage{\n    width:100%;height:100%;\n    background:\n      linear-gradient(var(--warm-100) 1px,transparent 1px) 0 0/16px 16px,\n      var(--warm-50);\n    padding:60px 24px;box-sizing:border-box;\n    display:flex;align-items:flex-start;justify-content:center;\n    overflow-y:auto;\n  }\n  .iso-stage .product{width:100%;max-width:332px;margin:0;box-shadow:0 2px 12px rgba(26,24,21,.06)}\n  .iso-stage .iso-caption{\n    position:absolute;top:18px;left:0;right:0;\n    text-align:center;font-family:var(--font-display);\n    text-transform:uppercase;font-size:11px;letter-spacing:.06em;\n    color:var(--warm-500);\n  }\n\n  /* ───── drawer (screen 5) ───── */\n  .drawer-bg{\n    position:absolute;inset:0;\n    background:rgba(26,24,21,.5);\n  }\n  .drawer{\n    position:absolute;left:0;right:0;bottom:0;\n    background:#fff;border-radius:var(--radius-xl) var(--radius-xl) 0 0;\n    padding:8px 0 0;box-shadow:0 -4px 24px rgba(26,24,21,.12);\n    max-height:92%;display:flex;flex-direction:column;\n  }\n  .drawer .grab{\n    width:36px;height:4px;background:var(--warm-300);\n    border-radius:var(--radius-full);margin:8px auto 6px;flex-shrink:0;\n  }\n  .drawer-head{padding:6px 18px 12px;border-bottom:1px solid var(--warm-200);flex-shrink:0}\n  .drawer-head h3{\n    font-family:var(--font-display);text-transform:uppercase;font-size:20px;\n    color:var(--brand-500);letter-spacing:.02em;margin:0;line-height:1.1;\n  }\n  .drawer-head .sub{\n    font-family:var(--font-body);font-size:12px;color:var(--warm-500);\n    margin-top:2px;\n  }\n  .drawer-body{padding:14px 18px;overflow-y:auto;flex:1}\n  .drawer .sec-label{\n    font-family:var(--font-display);text-transform:uppercase;font-size:11px;\n    letter-spacing:.06em;color:var(--warm-500);margin:14px 0 8px;\n  }\n  .drawer .sec-label:first-child{margin-top:0}\n  .slot{\n    display:flex;align-items:center;gap:10px;padding:12px 14px;\n    background:#fff;border:1.5px solid var(--warm-200);\n    border-radius:var(--radius-md);margin-bottom:8px;cursor:pointer;\n  }\n  .slot.selected{border-color:var(--brand-500);background:var(--brand-50)}\n  .slot .radio{\n    width:18px;height:18px;border:1.5px solid var(--warm-300);border-radius:var(--radius-full);\n    flex-shrink:0;position:relative;\n  }\n  .slot.selected .radio{border-color:var(--brand-500)}\n  .slot.selected .radio::after{\n    content:\"\";position:absolute;inset:3px;background:var(--brand-500);border-radius:var(--radius-full);\n  }\n  .slot .slot-name{font-family:var(--font-body);font-size:14px;color:var(--warm-800);font-weight:500;flex:1}\n  .slot .slot-meta{font-family:var(--font-body);font-size:12px;color:var(--warm-500)}\n\n  .extra-row{\n    display:flex;align-items:center;justify-content:space-between;gap:10px;\n    padding:12px 0;border-bottom:1px solid var(--warm-200);\n  }\n  .extra-row:last-child{border-bottom:0}\n  .extra-row .left{flex:1;min-width:0}\n  .extra-row .name{font-family:var(--font-body);font-weight:600;color:var(--warm-800);font-size:14px;line-height:1.3}\n  .extra-row .price-sub{font-family:var(--font-body);font-size:12px;color:var(--warm-500);margin-top:2px;font-variant-numeric:tabular-nums}\n  .extra-total{\n    display:flex;justify-content:space-between;align-items:baseline;\n    margin-top:10px;padding:12px 14px;background:var(--warm-100);\n    border-radius:var(--radius-md);\n  }\n  .extra-total .k{font-family:var(--font-body);font-size:13px;color:var(--warm-700)}\n  .extra-total .v{font-family:var(--font-body);font-size:18px;font-weight:700;color:var(--brand-500);font-variant-numeric:tabular-nums}\n\n  .drawer-foot{\n    padding:12px 18px 18px;border-top:1px solid var(--warm-200);\n    display:flex;gap:10px;flex-shrink:0;background:#fff;\n  }\n  .drawer-foot .btn-ghost,\n  .drawer-foot .btn-primary{padding:13px}\n\n  /* ───── toast ───── */\n  .toast-stack{\n    position:absolute;left:18px;right:18px;bottom:128px;\n    display:flex;flex-direction:column;gap:8px;align-items:stretch;\n    pointer-events:none;\n  }\n  .toast{\n    background:#fff;border:1px solid var(--success-border);\n    border-left:3px solid #10B981;\n    border-radius:var(--radius-md);padding:12px 14px;\n    display:flex;align-items:flex-start;gap:10px;\n    font-family:var(--font-body);font-size:13px;color:var(--warm-800);\n    line-height:1.4;animation:fadeUp 280ms var(--ease-out);\n  }\n  .toast .check{\n    width:18px;height:18px;border-radius:var(--radius-full);\n    background:#10B981;color:#fff;flex-shrink:0;\n    display:flex;align-items:center;justify-content:center;margin-top:1px;\n  }\n  .toast .check svg{display:block}\n  .toast .msg{flex:1}\n  .toast .msg strong{font-weight:600}\n  .toast.stacked-1{opacity:.85;transform:scale(.97) translateY(2px)}\n  .toast.stacked-2{opacity:.65;transform:scale(.94) translateY(4px)}\n\n  @keyframes fadeUp{\n    from{opacity:0;transform:translateY(8px)}\n    to{opacity:1;transform:translateY(0)}\n  }\n\n  /* legend chips on annotation column */\n  .legend{\n    display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;\n  }\n\n  /* spacer for product details (screen 1, 2) — make iso-stage tall enough */\n  .iso-spacer{height:24px}\n\n  /* ───── Novidade hero (pão da semana) ───── */\n  .novidade{\n    background:#fff;border:1px solid var(--warm-200);\n    border-radius:var(--radius-lg);overflow:hidden;\n    margin-bottom:14px;\n  }\n  .novidade .hero-photo{\n    width:100%;aspect-ratio:16/10;\n    background:#A07A52 center/cover no-repeat;\n    position:relative;\n  }\n  .novidade .hero-photo .tag{\n    position:absolute;top:12px;left:12px;\n    font-family:var(--font-display);text-transform:uppercase;\n    font-size:11px;letter-spacing:.08em;color:#fff;\n    background:rgba(26,24,21,.45);\n    padding:4px 8px;border-radius:var(--radius-xs);\n    backdrop-filter:saturate(120%);\n  }\n  .novidade .hero-photo .ph-label{\n    position:absolute;left:0;right:0;bottom:0;\n    font-family:var(--font-display);font-size:10px;letter-spacing:.08em;\n    text-transform:uppercase;color:rgba(255,255,255,.85);\n    text-align:center;padding:6px;background:rgba(0,0,0,.18);\n  }\n  .novidade .body{padding:14px 16px 16px}\n  .novidade .name{\n    font-family:var(--font-display);text-transform:uppercase;\n    font-size:24px;color:var(--brand-500);letter-spacing:.02em;\n    line-height:1.05;margin:0 0 4px;\n  }\n  .novidade .meta{font-family:var(--font-body);font-size:12px;color:var(--warm-500);margin-bottom:6px}\n  .novidade .sub{font-family:var(--font-body);font-size:14px;color:var(--warm-700);line-height:1.55;margin:0 0 14px}\n  .novidade .add-btn{\n    display:flex;align-items:center;justify-content:space-between;gap:8px;\n    width:100%;min-height:48px;padding:13px 16px;\n    background:var(--brand-500);color:#fff;\n    font-family:var(--font-body);font-weight:500;font-size:15px;\n    border:none;border-radius:var(--radius-md);cursor:pointer;\n  }\n  .novidade .add-btn .label{display:flex;align-items:center;gap:8px}\n  .novidade .add-btn:hover{background:var(--brand-600)}\n\n  /* ───── Nav badge (rascunho) ───── */\n  .nav-item{position:relative}\n  .nav-item .badge-dot{\n    position:absolute;top:4px;right:calc(50% - 16px);\n    width:9px;height:9px;border-radius:var(--radius-full);\n    background:var(--brand-500);\n    box-shadow:0 0 0 2px #fff;\n  }\n\n  /* in-list version (screen 3) — slightly slimmer */\n  .list-product .row{padding:12px}\n  .list-product .photo{width:72px;height:72px}\n  .list-product .name{font-size:15px}\n\n  /* visually mark removed / kept items in annotations */\n  .annot-bullets{margin-top:4px}\n  .annot-bullets li::marker{color:var(--warm-400)}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"doc-head\">\n  <div class=\"row1\">\n    <h1>Wireframe · Cardápio<\u002Fh1>\n    <span class=\"sub\">Portal do assinante · Frente C item 3 · 6 telas mobile (380×800)<\u002Fspan>\n    <span class=\"meta\">v2 · 14 mai 2026<\u002Fspan>\n  <\u002Fdiv>\n  <nav id=\"topnav\">\n    <a href=\"#s1\" data-target=\"s1\"><span class=\"n\">1<\u002Fspan>ProductCard · collapsed<\u002Fa>\n    <a href=\"#s2\" data-target=\"s2\"><span class=\"n\">2<\u002Fspan>ProductCard · expanded<\u002Fa>\n    <a href=\"#s3\" data-target=\"s3\"><span class=\"n\">3<\u002Fspan>Cardápio full<\u002Fa>\n    <a href=\"#s4\" data-target=\"s4\"><span class=\"n\">4<\u002Fspan>Cesta · Home<\u002Fa>\n    <a href=\"#s5\" data-target=\"s5\"><span class=\"n\">5<\u002Fspan>Drawer editar<\u002Fa>\n    <a href=\"#s6\" data-target=\"s6\"><span class=\"n\">6<\u002Fspan>Toast pós-add<\u002Fa>\n  <\u002Fnav>\n<\u002Fdiv>\n\n<main>\n\n<!-- ════════════════ TEMPLATES ════════════════ -->\n<template id=\"tpl-add-icon\">\n  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\">\n    <line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline>\n  <\u002Fsvg>\n<\u002Ftemplate>\n\n<!-- ════════════════ SCREEN 1: PRODUCT CARD COLLAPSED ════════════════ -->\n<section id=\"s1\" class=\"screen-block\">\n  <h2><span class=\"n\">1<\u002Fspan>ProductCard · estado collapsed<\u002Fh2>\n  <p class=\"desc\">Componente isolado, fora da lista. Foto + nome + peso + descrição curta + preço + botão primary full-width. Toda a área superior (foto + info) é clicável para expandir; o botão \"Adicionar à cesta\" dispara o POST e nunca expande o card.<\u002Fp>\n\n  <div class=\"layout\">\n    <div class=\"phone\">\n      <div class=\"iso-stage\">\n        <div class=\"iso-caption\">Componente isolado · sem topbar, sem nav<\u002Fdiv>\n        <div class=\"product\" id=\"card-iso-collapsed\">\n          <div class=\"row\" data-toggle=\"\">\n            <div class=\"photo ph-original\"><div class=\"ph-label\">Foto · pão original<\u002Fdiv><\u002Fdiv>\n            <div class=\"info\">\n              <div class=\"name\">Pão Original<\u002Fdiv>\n              <div class=\"meta\">700g · fermentação natural<\u002Fdiv>\n              <div class=\"desc\">Levain de 12 anos, casca grossa, miolo alveolado.<\u002Fdiv>\n              <div class=\"price-row\">\n                <div class=\"price\">R$ 27,00<\u002Fdiv>\n                <div class=\"expand-hint\">\n                  detalhes\n                  <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cta-zone\">\n            <button class=\"add-btn\" data-add=\"\" aria-label=\"Adicionar Pão Original à cesta\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n              Adicionar à cesta\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"accordion\">\n            <div class=\"accordion-inner\">\n              <div class=\"acc-label\">Sobre<\u002Fdiv>\n              <p class=\"acc-body\">Massa madre alimentada há 12 anos. Fermentação fria de 36 horas, casca caramelada, miolo úmido e alveolado. Sai do forno na manhã da entrega.<\u002Fp>\n              <div class=\"acc-label\">Ingredientes<\u002Fdiv>\n              <div class=\"acc-ingredients\">\n                <span class=\"ing-chip\">Farinha de trigo<\u002Fspan>\n                <span class=\"ing-chip\">Água<\u002Fspan>\n                <span class=\"ing-chip\">Sal marinho<\u002Fspan>\n                <span class=\"ing-chip\">Levain natural<\u002Fspan>\n              <\u002Fdiv>\n              <button class=\"acc-close\" data-toggle=\"\">\n                <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"18 15 12 9 6 15\"><\u002Fpolyline><\u002Fsvg>\n                Fechar\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"notes\">\n      <h3>Anatomia<\u002Fh3>\n      <ul>\n        <li><strong>Foto 88×88<\u002Fstrong> à esquerda · radius 8px · placeholder colorido quando não há JPG.<\u002Fli>\n        <li><strong>Nome<\u002Fstrong> em Montagu Slab 16/600 (warm-800).<\u002Fli>\n        <li><strong>Meta<\u002Fstrong> em 12px warm-500 — peso / formato, em uma linha.<\u002Fli>\n        <li><strong>Descrição curta<\u002Fstrong> 13px warm-600, 1 linha de texto livre.<\u002Fli>\n        <li><strong>Preço<\u002Fstrong> em brand-500, peso 600, tabular-nums.<\u002Fli>\n        <li><strong>\"detalhes ⌄\"<\u002Fstrong> em League Gothic 10px warm-400 — affordance discreta, na linha do preço.<\u002Fli>\n        <li><strong>Botão \"Adicionar à cesta\"<\u002Fstrong> primary full-width 44px (brand-500 → brand-600 hover).<\u002Fli>\n      <\u002Ful>\n\n      <h3>Interação<\u002Fh3>\n      <ul>\n        <li>Toda a área <code>.row<\u002Fcode> (foto + info) expande o card. Click pode ser tap em qualquer pixel dessa zona — não só na seta.<\u002Fli>\n        <li>O botão \"Adicionar à cesta\" tem <code>stopPropagation<\u002Fcode>: nunca expande, só dispara POST.<\u002Fli>\n        <li>Foco visível por teclado em ambos os controles (toggle + add).<\u002Fli>\n      <\u002Ful>\n\n      <h3>Mudanças vs. PR 2<\u002Fh3>\n      <div class=\"legend\">\n        <span class=\"pill kill\">Modal sobreposto<\u002Fspan>\n        <span class=\"pill add\">Accordion inline<\u002Fspan>\n        <span class=\"pill keep\">Botão \"Adicionar\" igual<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ SCREEN 2: PRODUCT CARD EXPANDED ════════════════ -->\n<section id=\"s2\" class=\"screen-block\">\n  <h2><span class=\"n\">2<\u002Fspan>ProductCard · estado expanded inline<\u002Fh2>\n  <p class=\"desc\">Mesmo card após click na área da foto/info. A foto fica onde está; o accordion abre <em>abaixo do botão<\u002Fem>, dentro do próprio card, mostrando \"Sobre\" + \"Ingredientes\". O \"Fechar\" é uma faixa minimalista no rodapé do accordion — em League Gothic, sem competir com o CTA principal.<\u002Fp>\n\n  <div class=\"layout\">\n    <div class=\"phone\">\n      <div class=\"iso-stage\">\n        <div class=\"iso-caption\">Componente isolado · accordion aberto<\u002Fdiv>\n        <div class=\"product is-expanded\" id=\"card-iso-expanded\">\n          <div class=\"row\" data-toggle=\"\">\n            <div class=\"photo ph-focaccia\"><d 2Fsvg><span class=\"lbl\">Cardápio<\u002Fspan><\u002Fbutton>\n        <button class=\"nav-item off\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><span class=\"lbl\">Perfil<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"notes\">\n      <h3>Posição e anatomia<\u002Fh3>\n      <ul>\n        <li><strong>Posição<\u002Fstrong> — flutua acima do nav inferior (sem footer sticky em v2). <code>bottom: 80px<\u002Fcode> · 18px de inset lateral.<\u002Fli>\n        <li><strong>Largura<\u002Fstrong> — preenche a largura disponível, max 344px no viewport 380.<\u002Fli>\n        <li><strong>Visual<\u002Fstrong> — fundo branco, borda lateral de 3px em <code>#10B981<\u002Fcode> (success), texto em warm-800. Ícone check num círculo verde sólido (8px stroke).<\u002Fli>\n        <li><strong>Animação<\u002Fstrong> — entra com fadeUp (translateY 8px → 0, 280ms, ease-out). Auto-dismiss em 3.5s.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Stack vs. substituir — proposta<\u002Fh3>\n      <div class=\"legend\">\n        <span class=\"pill add\">Stack até 3<\u002Fspan>\n        <span class=\"pill kill\">Substituir (descartado)<\u002Fspan>\n      <\u002Fdiv>\n      <ul>\n        <li><strong>Empilhar<\u002Fstrong> dá feedback de cada ação individual — confirma o que o usuário acabou de fazer mesmo em sequência rápida.<\u002Fli>\n        <li><strong>Topo da stack<\u002Fstrong> = mais recente, 100% opacity. Os anteriores recuam visualmente (opacity 85% → 65%, scale 97% → 94%).<\u002Fli>\n        <li><strong>Limite<\u002Fstrong> 3 toasts. 4º empurra o mais antigo para fora com fadeOut 200ms.<\u002Fli>\n        <li>Cada toast tem seu próprio timer; quando expira, recolhe e os de baixo deslizam pra cima.<\u002Fli>\n        <li><strong>Substituir<\u002Fstrong> foi descartado: em adição rápida, o usuário perde a confirmação da primeira ação e fica em dúvida se ela registrou.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Copy com flexão<\u002Fh3>\n      <ul>\n        <li><strong>masculino<\u002Fstrong> — \"Pão Original adicionad<u>o<\u002Fu> à cesta\", \"Brioche adicionad<u>o<\u002Fu> à cesta\", \"Multigrãos adicionad<u>o<\u002Fu> à cesta\".<\u002Fli>\n        <li><strong>feminino<\u002Fstrong> — \"Focaccia adicionad<u>a<\u002Fu> à cesta\", \"Ciabatta Rústica adicionad<u>a<\u002Fu> à cesta\".<\u002Fli>\n        <li>Catálogo precisa carregar a flexão por item (campo <code>gender: 'm' | 'f'<\u002Fcode>). Default <code>'m'<\u002Fcode> se faltar dado.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<script>\n  // ───── ProductCard expand/collapse ─────\n  document.querySelectorAll('.product').forEach(card => {\n    const toggles = card.querySelectorAll('[data-toggle]');\n    toggles.forEach(t => {\n      t.addEventListener('click', (e) => {\n        // ignore clicks bubbling from the add button\n        if (e.target.closest('[data-add]')) return;\n        card.classList.toggle('is-expanded');\n      });\n    });\n    const adds = card.querySelectorAll('[data-add]');\n    adds.forEach(a => {\n      a.addEventListener('click', (e) => {\n        e.stopPropagation();\n        // small flash\n        a.style.background = 'var(--brand-700)';\n        setTimeout(() => { a.style.background = ''; }, 180);\n      });\n    });\n  });\n\n  // ───── Qty selector (visual only) ─────\n  document.querySelectorAll('.qty').forEach(qty => {\n    const display = qty.querySelector('.n');\n    const minus = qty.querySelector('[data-step=\"-1\"]');\n    const plus  = qty.querySelector('[data-step=\"1\"]');\n    let n = parseInt(qty.dataset.qty || '1', 10);\n    const render = () => {\n      display.textContent = n;\n      minus.disabled = n <= 0;\n    };\n    render();\n    minus.addEventListener('click', (e) => { e.stopPropagation(); if (n > 0) { n--; render(); } });\n    plus.addEventListener('click',  (e) => { e.stopPropagation(); n++; render(); });\n  });\n\n  // ───── Top nav active state (scroll spy) ─────\n  const navLinks = document.querySelectorAll('#topnav a');\n  const sections = ['s1','s2','s3','s4','s5','s6'].map(id => document.getElementById(id));\n\n  function setActive(id){\n    navLinks.forEach(a => a.classList.toggle('active', a.dataset.target === id));\n  }\n  setActive('s1');\n\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(en => {\n      if (en.isIntersecting) setActive(en.target.id);\n    });\n  }, { rootMargin: '-30% 0px -60% 0px' });\n  sections.forEach(s => io.observe(s));\n\n  // smooth jump (no scrollIntoView)\n  navLinks.forEach(a => {\n    a.addEventListener('click', (e) => {\n      e.preventDefault();\n      const id = a.dataset.target;\n      const el = document.getElementById(id);\n      if (!el) return;\n      const top = el.getBoundingClientRect().top + window.scrollY - 110;\n      window.scrollTo({ top, behavior: 'smooth' });\n    });\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
